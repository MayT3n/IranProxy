name: Update Dashboard Data

on:
  schedule:
    - cron: '0 */6 * * *'  # هر ۶ ساعت
  workflow_dispatch:
  push:
    paths:
      - 'channels.json'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install --user --upgrade pip  # no extra deps needed
      - name: Run pipeline
        run: python scripts/main.py
      - name: Commit changes
        run: |
          if git diff --quiet data.json 2>/dev/null; then
            echo "No changes"
          else
            git config user.name "Hub Bot"
            git config user.email "bot@hub.local"
            git add data.json
            rm -f raw_data.json parsed_configs.json deduped_configs.json checked_configs.json scored_configs.json
            git commit -m "🔄 Auto update data [skip ci]"
            git push
          fi
      - name: Summary
        if: always()
        run: |
          if [ -f data.json ]; then
            python -c "
import json
with open('data.json') as f:
    d = json.load(f)
    s = d['stats']
    print(f'Configs: {s[\"total_configs\"]}, Online: {s[\"online_configs\"]}, Avg score: {s[\"avg_score\"]}')
" >> $GITHUB_STEP_SUMMARY
          fi