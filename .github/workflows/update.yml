name: Update IranProxy

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pipeline
        run: python run.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Debug changes
        run: |
          echo "===== GIT STATUS ====="
          git status

          echo "===== CHANGED FILES ====="
          git diff --name-only || true

      - name: Commit changes
        run: |
          git config user.name "IranProxy Bot"
          git config user.email "bot@users.noreply.github.com"

          git add data.json stats.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update $(date -u +'%Y-%m-%d %H:%M UTC')"

          echo "===== SYNC WITH REMOTE ====="
          git pull --rebase --autostash origin main || true

          git push origin main
