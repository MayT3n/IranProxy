name: Update IranProxy

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: iranproxy-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show files
        run: |
          pwd
          ls -la
          ls -la scripts || true

      - name: Run pipeline
        run: |
          python run.py
          python - << 'PY'
          import json, pathlib
          p = pathlib.Path("data.json")
          if not p.exists():
              raise SystemExit("data.json ساخته نشد")
          d = json.loads(p.read_text(encoding="utf-8"))
          print("generated_at:", d.get("generated_at"))
          print("total_configs:", d.get("stats", {}).get("total_configs"))
          print("online:", d.get("stats", {}).get("online"))
          PY
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit changes
        run: |
          git config user.name "IranProxy Bot"
          git config user.email "bot@users.noreply.github.com"

          git add data.json stats.json
          git status

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi
