- name: 📤 Commit changes
  run: |
    git config user.name "IranProxy Bot"
    git config user.email "bot@iranproxy.github.io"

    # مهم‌ترین تغییر اینجاست
    git add -A

    if git diff --staged --quiet; then
      echo "No changes"
      exit 0
    fi

    TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
    git commit -m "🔄 update ${TIMESTAMP}"
    git push
