name: Update IranProxy

on:
  workflow_dispatch:
  schedule:
    # هر 5 دقیقه، ولی با offset برای فرار از شلوغی سر ساعت
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pipeline
        run: python run.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Force timestamp update
        run: |
          python - << 'PY'
          import json, datetime, pathlib
          p = pathlib.Path("data.json")
          if p.exists():
              d = json.loads(p.read_text(encoding="utf-8"))
          else:
              d = {"stats": {}, "configs": []}
          d["pushed_at"] = datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z"
          p.write_text(json.dumps(d, ensure_ascii=False, indent=2), encoding="utf-8")
          print("pushed_at updated")
          PY

      - name: Commit changes
        run: |
          git config user.name "IranProxy Bot"
          git config user.email "bot@users.noreply.github.com"

          git add data.json stats.json
          git status

          git commit -m "Update $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push origin main
