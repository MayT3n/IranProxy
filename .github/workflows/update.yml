name: Update IranProxy

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

permissions:
  contents: write

concurrency:
  group: update-iranproxy
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show branch
        run: |
          git branch
          git status
          pwd
          ls -la

      - name: Run pipeline
        run: python run.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Write heartbeat
        run: |
          python - << 'PY'
          import json, pathlib, datetime

          now = datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z"

          hb = {
              "last_run": now,
              "source": "github-actions"
          }

          pathlib.Path("heartbeat.json").write_text(
              json.dumps(hb, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )

          p = pathlib.Path("data.json")
          if p.exists():
              d = json.loads(p.read_text(encoding="utf-8"))
          else:
              d = {"stats": {}, "configs": []}

          d["pushed_at"] = now
          p.write_text(
              json.dumps(d, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )

          pathlib.Path("stats.json").touch(exist_ok=True)

          print("heartbeat.json + pushed_at updated:", now)
          PY

      - name: Debug files
        run: |
          echo "=== files ==="
          ls -la
          echo "=== heartbeat.json ==="
          cat heartbeat.json || true
          echo "=== data.json summary ==="
          python - << 'PY'
          import json, pathlib
          p = pathlib.Path("data.json")
          if p.exists():
              d = json.loads(p.read_text(encoding="utf-8"))
              print("generated_at =", d.get("generated_at"))
              print("pushed_at    =", d.get("pushed_at"))
              print("total_configs=", d.get("stats", {}).get("total_configs"))
          else:
              print("data.json missing")
          PY

      - name: Auto commit
        run: |
          git config user.name "IranProxy Bot"
          git config user.email "bot@iranproxy.local"
          git add data.json stats.json heartbeat.json
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git commit -m "Update IranProxy - $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git pull --rebase origin main
          git push origin main
