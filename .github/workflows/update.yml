name: Update IranProxy Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    paths:
      - 'config.json'
      - 'scripts/**'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🚀 Run pipeline
        run: python run.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: 📤 Commit
        run: |
          git config user.name "IranProxy Bot"
          git config user.email "bot@iranproxy.github.io"
          git add data.json stats.json
          if git diff --staged --quiet; then
            echo "بدون تغییر"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "🔄 بروزرسانی ${TIMESTAMP}"
            git push
          fi
