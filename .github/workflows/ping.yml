name: Ping Test

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write timestamp
        run: |
          date -u +"%Y-%m-%d %H:%M:%S UTC" > last-run.txt
          cat last-run.txt

      - name: Commit timestamp
        run: |
          git config user.name "IranProxy Bot"
          git config user.email "bot@users.noreply.github.com"
          git add last-run.txt
          git commit -m "Ping $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes"
          git push